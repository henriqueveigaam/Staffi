<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro de Riscos</title>
</head>
<body>
    <header>
        <div class="d-flex">
            <aside class=" text-white pt-1 px-3 position-sticky top-0 vh-100 shadow" style="width: 324px;">
              <div class="text-center mb-0 mt-0">
                <img src="./img/azu.svg " alt="Logo" class="img-fluid" style="max-width: 150px;">
              </div>
                <ul class="nav flex-column mt-0">
                    
                    <li class="nav-item mb-2"> 
                        <div class="d-flex align-items-center gap-2">
                            <i class="bi bi-house"></i>
                        <a href="home.html" class="nav-link text-white d-flex align-items-center gap-2">Home
                        </a> 
                        </div>
                    </li>

                     <li class="nav-item mb-2">
                         <div class="d-flex align-items-center gap-2">
                            <i class="bi bi-people"></i> 
                        <a href="#" class="nav-link text-white d-flex align-items-center gap-2"> Funcionários
                        </a> 
                         </div>
                    </li>

                     <li class="nav-item mb-2"> 
                            <div class="d-flex align-items-center gap-2">
                                <i class="bi bi-building"></i>
                        <a href="riscos.html" class="nav-link text-white d-flex align-items-center gap-2">Riscos Ocupacionais
                        </a> 
                            </div>
                    </li>

                     <li class="nav-item mb-2"> 
                        <div class="d-flex align-items-center gap-2">
                            <i class="bi bi-box"></i>
                        <a href="epi.html" class="nav-link text-primary d-flex align-items-center gap-2">Estoque de EPIs
                        </a> 
                        </div>
                    </li>

                    <li class="nav-item mb-2"> 
                        <div class="d-flex align-items-center gap-2">
                            <i class="bi bi-bar-chart"></i>
                        <a href="#" class="nav-link text-white d-flex align-items-center gap-2">Relatórios
                        </a> 
                        </div>
                    </li>
                </ul>

            </aside>

   <main class="p-4 w-100">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6 shadow p-5 w-75 rounded bg-light">
        <h1 class="text-left fw-bold text-primary p-3 text-dark ">Cadastro de EPI</h1>
        <p class="text-left fw-bold text-primary p-3 text-secondary">Estoque de EPIs > Novo EPI</p>
        <form action="" class="row g-3">
             <div class="col-md-12">
                <label for="inputNome" class="form-label">Nome do EPI</label>
                <input type="text" class="form-control rounded-3 fs-6" id="inputNome" placeholder="Ex: Capacete" >
            </div>

             <div class="col-md-12">
                <label for="inputStatus" class="form-label">Tipo de Movimentação</label>
                <select id="inputStatus" class="form-select rounded-3 fs-6">
                    <option selected>Retirada</option>
                    <option>Devolução</option>
                    <option>Substituição</option>
                </select>
            </div>


             <div class="col-md-12">
                <label for="inputData" class="form-label">Data de entrada/saída do EPI</label>
                <input type="datetime-local" class="form-control rounded-3 fs-6" id="inputData">
            </div>
    
            <div class="col-md-6">
                <label for="inputSetor" class="form-label">Setor</label>
                <select id="inputSetor" class="form-select rounded-3 fs-6">
                    <option selected>Selecione o Setor...</option>
                    <option value="">Administrativo</option>
                    <option value="">Produção</option>
                    <option value="">Manutenção</option>
                    <option value="">Logística</option>
                    <option value="">Laboratório</option>
                    <option value="">Almoxarifado</option>

                </select>
            </div>

             <div class="col-md-6">
                <label for="inputGrau" class="form-label">Condição do Equipamento</label>
                <select id="inputGrau" class="form-select rounded-3 fs-6">
                    <option selected>Selecione a condição do equipamento</option>
                    <option value="">Novo</option>
                    <option value="">Bom Estado</option>
                    <option value="">Desgastado</option>
                    <option value="">Necessita de Reparos</option>
                   
                </select>
            </div>

            
             <div class="col-md-12">
                <label for="inputNome" class="form-label">Quantidade</label>
                <input type="number" class="form-control rounded-3 fs-6" id="inputNome" placeholder="Ex: 67" >
            </div>

            <div class="col-md-12">
                <label for="inputGrau" class="form-label">Tipo do Equipamento</label>
                <select id="inputGrau" class="form-select rounded-3 fs-6">
                    <option selected>Selecione o tipo do equipamento</option>
                    <option value="">Capacete</option>
                    <option value="">Bota</option>
                    <option value="">Luva</option>
                    <option value="">Óculos de proteção</option>
                   
                </select>
            </div>

             <div class="col-md-12">
                <label for="inputNome" class="form-label">Funcionário Responsável</label>
                <input type="text" class="form-control rounded-3 fs-6" id="inputNome" placeholder="Funcionário Responsável" >
            </div>

            <div class="col-md-12">
                <label for="inputStatus" class="form-label">Status</label>
                <select id="inputStatus" class="form-select rounded-3 fs-6">
                    <option selected>Em uso</option>
                    <option>Devolvido</option>
                    <option>Danificado</option>
                    <option>Vencido</option>
                </select>
            </div>

            <div class="col-md-12">
                <button type="submit" class="btn btn-primary">Salvar EPI</button>
                <button type="submit" class="btn ">Cancelar</button>
            </div>
            
        </form>
        </div>
         </div>
          </div>
    </main>

        </div>
    </header>
 

    <footer>

    </footer>
</body>
</html>
